<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 목록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
        th { background-color: #4a90d9; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }
        .btn-danger { background: #e74c3c; }
        .btn:hover { opacity: 0.85; }
        .msg-success { color: green; margin: 10px 0; }
        .msg-error { color: red; margin: 10px 0; }
        footer { margin-top: 40px; padding: 12px 16px; border-top: 1px solid #ccc; font-size: 0.85em; color: #555; background-color: #f9f9f9; }
    </style>
</head>
<body>

<h1>카테고리 목록</h1>

<p th:if="${successMessage}" class="msg-success" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" class="msg-error" th:text="${errorMessage}"></p>

<a class="btn" th:href="@{/categories/create}">+ 카테고리 등록</a>
<a class="btn" th:href="@{/products}" style="background:#6c757d; margin-left:8px;">← 상품 목록</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리 이름</th>
        <th>삭제</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
        <td th:text="${cat.id}"></td>
        <td th:text="${cat.name}"></td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                <button type="submit" class="btn btn-danger"
                        onclick="return confirm('삭제하시겠습니까?')">삭제</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(categories)}">
        <td colspan="3" style="text-align:center;">등록된 카테고리가 없습니다.</td>
    </tr>
    </tbody>
</table>

<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + '  │  학번: 2271510  │  성명: 박계령'}"></p>
</footer>

</body>
</html>
